  <!-- Accent line -->
  <line x1="420" y1="232" x2="780" y2="232" stroke="#7f7fd5" stroke-width="1" opacity="0.5"/>
  <!-- Tagline -->
  <text x="600" y="256" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
