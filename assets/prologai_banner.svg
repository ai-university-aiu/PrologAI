<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a4e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0e0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a8ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="280" fill="url(#bgGrad)" rx="12"/>
  <!-- Decorative circles - left -->
  <circle cx="55" cy="55" r="38" fill="none" stroke="#7f7fd5" stroke-width="1.2" opacity="0.35"/>
  <circle cx="55" cy="55" r="22" fill="none" stroke="#7f7fd5" stroke-width="0.8" opacity="0.2"/>
  <!-- Decorative circles - right -->
  <circle cx="1145" cy="225" r="48" fill="none" stroke="#86a8e7" stroke-width="1.2" opacity="0.28"/>
  <circle cx="1145" cy="225" r="28" fill="none" stroke="#86a8e7" stroke-width="0.8" opacity="0.18"/>
  <!-- Subtle grid dots -->
  <circle cx="120" cy="200" r="2" fill="#7f7fd5" opacity="0.25"/>
  <circle cx="160" cy="200" r="2" fill="#7f7fd5" opacity="0.25"/>
  <circle cx="120" cy="230" r="2" fill="#7f7fd5" opacity="0.25"/>
  <circle cx="160" cy="230" r="2" fill="#7f7fd5" opacity="0.25"/>
  <circle cx="1040" cy="60" r="2" fill="#86a8e7" opacity="0.25"/>
  <circle cx="1080" cy="60" r="2" fill="#86a8e7" opacity="0.25"/>
  <circle cx="1040" cy="90" r="2" fill="#86a8e7" opacity="0.25"/>
  <circle cx="1080" cy="90" r="2" fill="#86a8e7" opacity="0.25"/>
  <!-- Main title -->
  <text x="600" y="150" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
